<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Регламент поступления: условия, вступительный экзамен и требования к специальности."
    />
    <title>Регламент поступления</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
      :root {
        color-scheme: light;
        --page: #f6f2ea;
        --surface: #fffaf1;
        --ink: #1d2620;
        --muted: #617067;
        --line: #d7cfc0;
        --accent: #9d2f22;
        --accent-soft: #f3d9d1;
        --shadow: 0 18px 50px rgba(46, 38, 25, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          linear-gradient(180deg, rgba(255, 250, 241, 0.76), rgba(246, 242, 234, 0.94)),
          var(--page);
        color: var(--ink);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
        line-height: 1.65;
      }

      .site-header {
        border-bottom: 1px solid var(--line);
        background: rgba(255, 250, 241, 0.86);
        backdrop-filter: blur(12px);
      }

      .header-inner {
        width: min(960px, calc(100% - 32px));
        margin: 0 auto;
        padding: 28px 0 22px;
      }

      .eyebrow {
        margin: 0 0 6px;
        color: var(--accent);
        font-size: 0.78rem;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .site-title {
        margin: 0;
        font-family: Georgia, "Times New Roman", serif;
        font-size: clamp(2rem, 5vw, 4rem);
        font-weight: 700;
        line-height: 1.05;
      }

      .site-subtitle {
        max-width: 680px;
        margin: 14px 0 0;
        color: var(--muted);
        font-size: 1.02rem;
      }

      main {
        width: min(960px, calc(100% - 32px));
        margin: 34px auto 48px;
      }

      .document {
        display: grid;
        grid-template-columns: minmax(0, 1fr);
        gap: 22px;
        padding: clamp(22px, 5vw, 46px);
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--surface);
        box-shadow: var(--shadow);
      }

      .content h1,
      .content h2,
      .content h3,
      .content h4 {
        margin: 0;
        color: var(--ink);
        font-family: Georgia, "Times New Roman", serif;
        line-height: 1.2;
      }

      .content h1 {
        display: none;
      }

      .content h2 {
        margin-top: 12px;
        padding-top: 24px;
        border-top: 1px solid var(--line);
        font-size: clamp(1.45rem, 3vw, 2rem);
      }

      .content h2:first-of-type {
        margin-top: 0;
        padding-top: 0;
        border-top: 0;
      }

      .content h3 {
        margin-top: 24px;
        color: var(--accent);
        font-size: 1.24rem;
      }

      .content h4 {
        margin-top: 24px;
        font-size: 1.08rem;
      }

      .content p {
        margin: 10px 0 0;
      }

      .content ol,
      .content ul {
        margin: 10px 0 0;
        padding-left: 1.4rem;
      }

      .content li {
        margin: 6px 0;
      }

      .content strong {
        color: var(--accent);
      }

      .content a {
        color: var(--accent);
        text-decoration-thickness: 0.08em;
        text-underline-offset: 0.2em;
      }

      .notice {
        display: none;
        margin: 0;
        padding: 14px 16px;
        border: 1px solid var(--accent-soft);
        border-radius: 8px;
        background: #fff3ef;
        color: var(--accent);
      }

      .notice.is-visible {
        display: block;
      }

      @media (max-width: 640px) {
        .header-inner {
          padding-top: 22px;
        }

        main {
          margin-top: 20px;
        }

        .document {
          padding: 20px;
        }
      }
    </style>
  </head>
  <body>
    <header class="site-header">
      <div class="header-inner">
        <p class="eyebrow">Фортепианное отделение</p>
        <h1 class="site-title">Регламент поступления</h1>
        <p class="site-subtitle">
          Условия приема, вступительный экзамен и требования для вновь поступающих и
          продолжающих обучение.
        </p>
      </div>
    </header>

    <main>
      <article class="document" aria-live="polite">
        <p class="notice" id="notice">
          Не удалось загрузить REGLAMENT.md. Проверьте, что файл находится рядом с
          index.html и сайт открыт через веб-сервер.
        </p>
        <div class="content" id="content">Загрузка регламента...</div>
      </article>
    </main>

    <script>
      marked.use({
        gfm: true,
        breaks: false,
      });

      async function renderReglament() {
        const content = document.querySelector("#content");
        const notice = document.querySelector("#notice");

        try {
          const response = await fetch("REGLAMENT.md", { cache: "no-store" });

          if (!response.ok) {
            throw new Error(`HTTP ${response.status}`);
          }

          const markdown = await response.text();
          content.innerHTML = marked.parse(markdown);
        } catch (error) {
          notice.classList.add("is-visible");
          content.textContent = "";
          console.error("Markdown render failed:", error);
        }
      }

      renderReglament();
    </script>
  </body>
</html>
